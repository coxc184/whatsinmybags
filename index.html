<audio id="clickSound" src="mixkit-video-game-mystery-alert-234.wav"></audio>

  <!-- JavaScript -->
<script>
const buttons = document.querySelectorAll(".imageButton");
const boxes = document.querySelectorAll(".dialogueBox");
const clickSound = new Audio("click.mp3"); // <-- add your sound file here

let typingInterval;

/* ===== TYPEWRITER EFFECT ===== */
function typeText(element, text, speed = 25) {
  clearInterval(typingInterval);
  element.textContent = "";
  let i = 0;

  typingInterval = setInterval(() => {
    element.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(typingInterval);
  }, speed);
}

/* ===== CLICK FOR DIALOGUE (EXACT CLICK POSITION + SOUND) ===== */
buttons.forEach((button, index) => {
  const box = boxes[index];

  button.addEventListener("click", function(e) {
    e.stopPropagation();

    // play click sound
    clickSound.currentTime = 0; // reset in case of fast clicks
    clickSound.play();

    // exact click position (scroll-safe)
    const x = e.pageX;
    const y = e.pageY;

    box.style.left = x + "px";
    box.style.top = y + "px";

    // hide others
    boxes.forEach(b => b.classList.remove("show"));

    box.classList.add("show");

    const text = box.getAttribute("data-text");
    typeText(box, text);
  });
});

/* ===== CLICK OUTSIDE CLOSES ===== */
document.addEventListener("click", () => {
  boxes.forEach(box => box.classList.remove("show"));
});
</script>
